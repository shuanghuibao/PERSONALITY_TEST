<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>运动兴趣倾向小测</title>
  <style>
    :root {
      --bg: #0f1419;
      --card: #1a222d;
      --text: #e8eef4;
      --muted: #8b9aab;
      --accent: #3d9cf9;
      --accent-dim: #2563a8;
      --border: #2a3544;
    }
    * { box-sizing: border-box; }
    body {
      margin: 0;
      min-height: 100vh;
      font-family: "SF Pro Text", "PingFang SC", "Microsoft YaHei", system-ui, sans-serif;
      background: var(--bg);
      color: var(--text);
      line-height: 1.55;
    }
    main {
      max-width: 36rem;
      margin: 0 auto;
      padding: 1.5rem 1rem 3rem;
    }
    h1 {
      font-size: 1.35rem;
      font-weight: 600;
      margin: 0 0 0.5rem;
    }
    .sub {
      color: var(--muted);
      font-size: 0.9rem;
      margin-bottom: 1.5rem;
    }
    .card {
      background: var(--card);
      border: 1px solid var(--border);
      border-radius: 12px;
      padding: 1.25rem 1.25rem 1rem;
    }
    .progress {
      height: 4px;
      background: var(--border);
      border-radius: 2px;
      margin-bottom: 1rem;
      overflow: hidden;
    }
    .progress > i {
      display: block;
      height: 100%;
      background: linear-gradient(90deg, var(--accent-dim), var(--accent));
      border-radius: 2px;
      transition: width 0.25s ease;
    }
    .q-text {
      font-size: 1.05rem;
      margin-bottom: 1rem;
    }
    button.option {
      display: block;
      width: 100%;
      text-align: left;
      padding: 0.75rem 1rem;
      margin-bottom: 0.5rem;
      border: 1px solid var(--border);
      border-radius: 8px;
      background: #141c26;
      color: var(--text);
      font-size: 0.95rem;
      cursor: pointer;
      transition: border-color 0.15s, background 0.15s;
    }
    button.option:hover {
      border-color: var(--accent-dim);
      background: #182030;
    }
    button.option:focus-visible {
      outline: 2px solid var(--accent);
      outline-offset: 2px;
    }
    .result-title {
      font-size: 1.15rem;
      margin: 0 0 0.75rem;
      color: var(--accent);
    }
    .result-body { margin-bottom: 1rem; }
    .cite {
      font-size: 0.8rem;
      color: var(--muted);
      border-top: 1px solid var(--border);
      padding-top: 0.75rem;
      margin-top: 0.5rem;
    }
    .btn-row { margin-top: 1rem; }
    button.primary {
      padding: 0.6rem 1.1rem;
      border: none;
      border-radius: 8px;
      background: var(--accent);
      color: #0a0e12;
      font-weight: 600;
      cursor: pointer;
      font-size: 0.9rem;
    }
    button.primary:hover { filter: brightness(1.08); }
    .hidden { display: none !important; }
  </style>
</head>
<body>
  <main>
    <h1>运动兴趣倾向小测</h1>
    <p class="sub">
      通过少量选择题，粗略归纳你在「人际—环境—负荷特征」上的偏好。结果用于自我探索与项目初选，不能替代医学或训练处方。
    </p>

    <section id="screen-start" class="card">
      <p style="margin-top:0">
        本测将你对运动的偏好映射到三个常见维度：<strong>独处—协作</strong>、<strong>室内—户外</strong>、<strong>爆发/技巧—耐力</strong>。维度划分参考大众体育与身体活动研究中对项目特征的常见描述（如代谢需求、环境、社交结构），并非临床诊断。
      </p>
      <div class="btn-row">
        <button type="button" class="primary" id="btn-start">开始测试</button>
      </div>
    </section>

    <section id="screen-quiz" class="card hidden">
      <div class="progress" aria-hidden="true"><i id="progress-bar" style="width:0%"></i></div>
      <p class="q-text" id="question-text"></p>
      <div id="options"></div>
    </section>

    <section id="screen-result" class="card hidden">
      <h2 class="result-title" id="result-title"></h2>
      <div class="result-body" id="result-body"></div>
      <p class="cite" id="result-cite"></p>
      <div class="btn-row">
        <button type="button" class="primary" id="btn-retry">重新测试</button>
      </div>
    </section>
  </main>

  <script>
    /**
     * 维度分数：solo/team, indoor/outdoor, burst_skill/endurance
     * 每题选项增加对应维度的权重（整数，便于理解）
     */
    const DIMENSIONS = {
      team: "协作倾向",
      solo: "独处自主",
      outdoor: "户外环境",
      indoor: "室内可控环境",
      burst: "爆发/技巧/短时高强度",
      endurance: "节律耐力/长时间中等强度",
    };

    const QUESTIONS = [
      {
        text: "训练或比赛时，你更享受哪种氛围？",
        choices: [
          { label: "和固定队友磨合战术、互相掩护", scores: { team: 2, endurance: 1 } },
          { label: "独自完成计划，节奏完全自己掌握", scores: { solo: 2, endurance: 1 } },
          { label: "临时组队也可以，但核心是当场发挥", scores: { team: 1, burst: 1 } },
          { label: "人少、安静，更像「和自己对话」", scores: { solo: 2, indoor: 1 } },
        ],
      },
      {
        text: "你更容易坚持下来的场景是？",
        choices: [
          { label: "刮风下雨也能去的固定场地（馆里）", scores: { indoor: 2, endurance: 1 } },
          { label: "路线随季节变化：公园、河边、山路", scores: { outdoor: 2, endurance: 2 } },
          { label: "短平快：一节课或一局内结束战斗", scores: { burst: 2, indoor: 1 } },
          { label: "户外对抗或探险式的一天", scores: { outdoor: 2, team: 1, burst: 1 } },
        ],
      },
      {
        text: "面对「累」这件事，你的真实感受更接近？",
        choices: [
          { label: "长时间匀速的累可以接受，怕的是无聊", scores: { endurance: 2, solo: 1 } },
          { label: "短时间顶到极限很爽，久了容易腻", scores: { burst: 2 } },
          { label: "有人一起扛就不觉得那么累", scores: { team: 2, endurance: 1 } },
          { label: "可控环境下逐步加量最安心", scores: { indoor: 1, endurance: 1, solo: 1 } },
        ],
      },
      {
        text: "你更想精进的能力是？",
        choices: [
          { label: "反复打磨一个技术动作直到稳定", scores: { burst: 2, solo: 1, indoor: 1 } },
          { label: "读场面、做决策、分配体能", scores: { team: 2, endurance: 1 } },
          { label: "心肺与意志：同样配速能撑更久", scores: { endurance: 2, outdoor: 1 } },
          { label: "绝对力量或速度的瞬间输出", scores: { burst: 2 } },
        ],
      },
      {
        text: "约你运动的人，怎样最容易成功？",
        choices: [
          { label: "固定时间固定项目，像日程一样写进日历", scores: { indoor: 1, endurance: 1, solo: 1 } },
          { label: "「这周末爬山/骑车去」一句话就够", scores: { outdoor: 2, team: 1 } },
          { label: "「缺一个人」——需要我补位我才去", scores: { team: 2, burst: 1 } },
          { label: "别约我，我按自己的课表来", scores: { solo: 2 } },
        ],
      },
      {
        text: "如果只能选一类媒体内容长期看，你会选？",
        choices: [
          { label: "战术复盘、训练方法、动作解析", scores: { burst: 1, solo: 1, indoor: 1 } },
          { label: "赛事集锦、团队配合高光", scores: { team: 2, burst: 1 } },
          { label: "越野、铁三、长跑者的纪实", scores: { endurance: 2, outdoor: 1 } },
          { label: "户外生存、攀岩、滑雪环境片", scores: { outdoor: 2, burst: 1 } },
        ],
      },
    ];

    const RESULTS = [
      {
        id: "team-outdoor-endurance",
        match: (s) => s.team >= s.solo && s.outdoor >= s.indoor && s.endurance >= s.burst,
        title: "协作 × 户外 × 耐力型",
        body:
          "你更可能在需要团队配合、户外环境与持续输出结合的项目里获得满足感，例如足球、户外骑行集体拉练、定向越野等。大众体育研究常把「社交支持」与「自然环境」列为坚持身体活动的重要促进因素；团体户外项目同时满足两者。建议：从低冲击、可渐进加量的户外团体活动入门，注意天气与补水。",
        cite:
          "依据：身体活动坚持因素（社会支持、环境可及性）在公共卫生与运动心理学文献中反复被讨论；项目特征描述参考常见有氧—团队户外运动的代谢与结构特点。本结果仅为兴趣归纳。",
      },
      {
        id: "solo-outdoor-endurance",
        match: (s) => s.solo > s.team && s.outdoor >= s.indoor && s.endurance >= s.burst,
        title: "独处 × 户外 × 耐力型",
        body:
          "长跑、骑行、徒步等「自己定配速、长时间在户外」的项目往往更契合你。耐力主导的活动与中等强度持续能量供应相关，对心血管适应有益；独处偏好可降低协调他人的心理成本。建议：关注路面安全与周期化训练，避免单次量突增。",
        cite:
          "依据：耐力项目以有氧代谢为主是运动生理学常识；独处偏好属于个人动机维度，与项目选择相关但非体质判定。",
      },
      {
        id: "team-indoor-burst",
        match: (s) => s.team >= s.solo && s.indoor >= s.outdoor && s.burst >= s.endurance,
        title: "协作 × 室内 × 爆发/技巧型",
        body:
          "室内球类、排球、击剑等需要短间歇高强度、技巧与战术的项目可能更合拍。这类活动常涉及无氧与磷酸原系统供能比例较高的回合制结构。建议：重视热身与关节负荷管理，技术课与体能课穿插安排。",
        cite:
          "依据：间歇性高强度运动（团队球类等）的供能特点见运动生理学教材中的无氧/有氧比例描述。",
      },
      {
        id: "solo-indoor-burst",
        match: (s) => s.solo > s.team && s.indoor >= s.outdoor && s.burst >= s.endurance,
        title: "独处 × 室内 × 爆发/技巧型",
        body:
          "举重、体操单项、拳击沙袋、室内攀岩（偏抱石）等「可控环境 + 技术/力量输出」可能更吸引你。室内环境便于渐进加重与技术反馈。建议：在教练或规范计划下学习技术，避免盲目上大重量。",
        cite:
          "依据：力量与技巧类项目对环境与安全设施要求较高，体育教学中常强调室内结构化训练。",
      },
      {
        id: "balanced",
        match: () => true,
        title: "多面平衡型",
        body:
          "你的各维度得分接近，说明你对运动形式的包容度较高，或情境依赖较强（例如有时想社交、有时想独处）。这在现实里很常见：兴趣会随季节、工作强度、同伴而变化。建议：用「季度主题」轮换 1–2 个主项，既保新鲜感又利于身体全面发展；若有具体目标（减脂、备赛等）再收窄项目。",
        cite:
          "依据：兴趣与坚持度受情境与生命周期影响，是健康促进研究中的常见结论；无单一「最佳人格—项目」映射。",
      },
    ];

    let index = 0;
    const scores = { team: 0, solo: 0, outdoor: 0, indoor: 0, burst: 0, endurance: 0 };

    function $(id) {
      return document.getElementById(id);
    }

    function show(id) {
      ["screen-start", "screen-quiz", "screen-result"].forEach((x) => {
        $(x).classList.toggle("hidden", x !== id);
      });
    }

    function renderQuestion() {
      const q = QUESTIONS[index];
      $("question-text").textContent = `第 ${index + 1} / ${QUESTIONS.length} 题：${q.text}`;
      const pct = ((index) / QUESTIONS.length) * 100;
      $("progress-bar").style.width = pct + "%";
      const wrap = $("options");
      wrap.innerHTML = "";
      q.choices.forEach((c, i) => {
        const b = document.createElement("button");
        b.type = "button";
        b.className = "option";
        b.textContent = c.label;
        b.addEventListener("click", () => {
          Object.entries(c.scores || {}).forEach(([k, v]) => {
            scores[k] = (scores[k] || 0) + v;
          });
          index += 1;
          if (index < QUESTIONS.length) renderQuestion();
          else showResult();
        });
        wrap.appendChild(b);
      });
    }

    function showResult() {
      $("progress-bar").style.width = "100%";
      const s = { ...scores };
      let picked = RESULTS.find((r) => r.id !== "balanced" && r.match(s));
      if (!picked) picked = RESULTS.find((r) => r.id === "balanced");

      $("result-title").textContent = picked.title;
      $("result-body").textContent = picked.body;
      $("result-cite").textContent = picked.cite;
      show("screen-result");
    }

    function resetQuiz() {
      index = 0;
      Object.keys(scores).forEach((k) => {
        scores[k] = 0;
      });
    }

    $("btn-start").addEventListener("click", () => {
      resetQuiz();
      show("screen-quiz");
      renderQuestion();
    });

    $("btn-retry").addEventListener("click", () => {
      resetQuiz();
      show("screen-quiz");
      renderQuestion();
    });
  </script>
</body>
</html>
